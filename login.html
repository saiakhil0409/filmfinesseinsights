<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Film Finesse Insights</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;
  background:#0f0f13;
  color:#f4f2ee;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:1rem;
}

/* Background film grain effect */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(232,160,48,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(232,160,48,0.03) 0%, transparent 50%);
  pointer-events:none;
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:1.6rem;
  font-weight:600;
  color:#f4f2ee;
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:2.5rem;
  cursor:pointer;
}
.logo-mark{color:#e8a030;font-style:italic}

.card{
  background:#17171e;
  border:1px solid #2e2e3a;
  border-radius:16px;
  padding:2.5rem 2rem;
  width:100%;
  max-width:380px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  position:relative;
}

.lock-icon{
  width:64px;height:64px;
  background:rgba(232,160,48,0.12);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.25rem;
  font-size:1.8rem;
}

.card h1{
  font-family:'Playfair Display',serif;
  font-size:1.4rem;
  font-weight:600;
  margin-bottom:.4rem;
  color:#f4f2ee;
}
.card p{
  font-size:13px;
  color:#888;
  margin-bottom:1.75rem;
  line-height:1.5;
}

.field{
  margin-bottom:1rem;
  text-align:left;
}
.field label{
  display:block;
  font-size:11px;
  font-weight:600;
  color:#888;
  text-transform:uppercase;
  letter-spacing:.06em;
  margin-bottom:6px;
}
.field input{
  width:100%;
  background:#1f1f28;
  border:1px solid #3e3e4e;
  border-radius:8px;
  padding:12px 16px;
  font-size:15px;
  color:#f4f2ee;
  font-family:'Inter',sans-serif;
  transition:border-color .2s, box-shadow .2s;
}
.field input:focus{
  outline:none;
  border-color:#e8a030;
  box-shadow:0 0 0 3px rgba(232,160,48,0.12);
}
.field input::placeholder{color:#555}

.btn-login{
  width:100%;
  background:#e8a030;
  color:#111;
  border:none;
  padding:13px;
  border-radius:8px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  font-family:'Inter',sans-serif;
  transition:background .15s, transform .1s;
  margin-top:.25rem;
  letter-spacing:.01em;
}
.btn-login:hover{background:#c47c1a}
.btn-login:active{transform:scale(.98)}

.error-msg{
  font-size:13px;
  color:#e05252;
  margin-top:.75rem;
  min-height:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.back-link{
  display:block;
  margin-top:1.5rem;
  font-size:13px;
  color:#888;
  text-decoration:none;
  transition:color .15s;
}
.back-link:hover{color:#e8a030}

.shake{animation:shake .4s ease}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}

/* Loading spinner on submit */
.btn-login.loading{
  pointer-events:none;
  opacity:.7;
}
</style>
</head>
<body>

<a class="logo" href="/">Film Finesse <span class="logo-mark">Insights</span></a>

<div class="card" id="card">
  <div class="lock-icon">🔐</div>
  <h1>Admin Login</h1>
  <p>Sign in to write and manage<br>movie reviews</p>

  <div class="field">
    <label for="pw">Password</label>
    <input type="password" id="pw" placeholder="Enter your password" autocomplete="current-password">
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign in</button>

  <div class="error-msg" id="errorMsg"></div>

  <a class="back-link" href="/">← Back to Film Finesse Insights</a>
</div>

<script>
(function(){
  'use strict';
  var PASS = 'MyInsights@Reviews';

  // If already logged in, redirect to home
  if(sessionStorage.getItem('ffi_admin') === 'true'){
    window.location.href = '/';
    return;
  }

  window.doLogin = function(){
    var pw = document.getElementById('pw').value;
    var btn = document.getElementById('loginBtn');
    var err = document.getElementById('errorMsg');
    var card = document.getElementById('card');

    if(!pw){
      err.textContent = 'Please enter your password.';
      document.getElementById('pw').focus();
      return;
    }

    // Brief loading state
    btn.textContent = 'Signing in…';
    btn.classList.add('loading');

    setTimeout(function(){
      if(pw === PASS){
        sessionStorage.setItem('ffi_admin', 'true');
        // Redirect to home
        window.location.href = '/';
      } else {
        btn.textContent = 'Sign in';
        btn.classList.remove('loading');
        err.innerHTML = '⚠️ Incorrect password. Try again.';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
        card.classList.add('shake');
        setTimeout(function(){ card.classList.remove('shake'); }, 500);
      }
    }, 400);
  };

  // Enter key support
  document.getElementById('pw').addEventListener('keydown', function(e){
    if(e.key === 'Enter') window.doLogin();
  });
})();
</script>

</body>
</html>
